name: Feature Request
description: Propose a new feature or capability
title: "[feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see added to minimax-scraper.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the use case?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Describe the desired behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches? Why is this the best one?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this feature is complete? List specific, testable criteria.
      placeholder: |
        - [ ] User can...
        - [ ] System should...
        - [ ] Output includes...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system does this affect?
      options:
        - Backend - Discovery Engine
        - Backend - Scrape Engine
        - Backend - API
        - Backend - AI
        - Frontend - File Explorer
        - Frontend - Terminal
        - Frontend - Markdown Preview
        - Frontend - Scraper Controls
        - Frontend - AI Chat
        - Frontend - Window Manager
        - Infrastructure / CI/CD
        - Documentation
        - Other
    validations:
      required: true
