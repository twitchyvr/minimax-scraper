name: Documentation
description: Report missing or outdated documentation
title: "[docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: what
    attributes:
      label: What's Missing or Outdated
      description: Describe what documentation needs to be added or updated.
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where
      description: Which documentation needs updating?
      options:
        - README.md
        - GitHub Wiki
        - CHANGELOG.md
        - CONTRIBUTING.md
        - Inline code comments
        - API documentation
        - Frontend component docs
        - Other
      multiple: true
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Content
      description: What should the documentation say? Draft the content if possible.
