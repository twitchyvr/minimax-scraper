name: Refactor
description: Propose code restructuring with no behavior change
title: "[refactor]: "
labels: ["refactor"]
body:
  - type: textarea
    id: current
    attributes:
      label: Current State
      description: What does the code look like now? What's the problem with its current structure?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why This Is Problematic
      description: Why does this need to change? (readability, performance, maintainability, etc.)
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: Target State
      description: What should the code look like after refactoring?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Affected Files
      description: List the files that will need to change.
      placeholder: |
        - backend/app/scraper/engine.py
        - backend/app/scraper/fetcher.py

  - type: dropdown
    id: risk
    attributes:
      label: Risk Level
      description: How risky is this refactor?
      options:
        - Low — isolated change, no external impact
        - Medium — touches multiple files, needs careful testing
        - High — architectural change, broad impact
    validations:
      required: true
